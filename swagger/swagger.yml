  /solicitud/radicar/{id}:
    post:
      tags:
      - solicitud
      description: Radicar una solicitud (cambiar estado y crear registros)
      operationId: SolicitudController.Radicar
      parameters:
      - in: path
        name: id
        description: The id of the Solicitud to radicar
        required: true
        type: integer
        format: int64
      - in: body
        name: body
        description: body for additional data if needed
