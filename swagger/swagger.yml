  /solicitud/:
    post:
      tags:
      - solicitud
      description: create Solicitud
      operationId: SolicitudController.Create
      parameters:
      - in: body
        name: body
        description: body for Solicitud content
        required: true
        schema:
          $ref: '#/definitions/models.Solicitud'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: body is empty
  /solicitud/aprobar-rechazar:
    post:
      tags:
      - solicitud
      description: Aprueba o rechaza una solicitud creando un registro en el historial
      operationId: SolicitudController.Aprobar_Rechazar
      parameters:
      - in: body
        name: body
        description: body para aprobar o rechazar solicitud
