  /solicitud/formularios/{documentoId}:
    get:
      tags:
      - solicitud
      description: Obtener formularios por documentoId
      operationId: SolicitudController.GetFormulariosByDocumentoId
      parameters:
      - in: path
        name: documentoId
        description: Identificador del usuario en front
        required: true
        type: string
      - in: query
        name: estadoSolicitud
        description: Estados de la solicitud (repetible)
        type: array
        items:
          type: string
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/interface{}'
        "400":
          description: bad request
  /solicitud/radicar/{id}:
    post:
      tags:
      - solicitud
      description: Radicar una solicitud (cambiar estado y crear registros)
      operationId: SolicitudController.Radicar
      parameters:
      - in: path
        name: id
        description: The id of the Solicitud to radicar
        required: true
        type: integer
        format: int64
      - in: body
        name: body
        description: body for additional data if needed
        schema:
          $ref: '#/definitions/models.SolicitudRequest'
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/models.SolicitudResponse'
        "400":
          description: Bad request
        "404":
          description: Solicitud not found
  /soporte_solicitud/:
    post:
      tags:
      - soporte_solicitud
      description: create SoporteSolicitud con múltiples documentos
      operationId: SoporteSolicitudController.Create
